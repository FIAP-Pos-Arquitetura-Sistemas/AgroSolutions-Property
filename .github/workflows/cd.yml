name: CD - Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./AgroSolutions-FarmService
          file: ./AgroSolutions-FarmService/Dockerfile
          push: true
          tags: viniciusdelr/agrosolutions-farmservice:v1

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: 'fiap-rg' 
          cluster-name: 'agro-solutions-cluster'

      - name: Deploy to AKS
        uses: Azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/deployment.yml
            k8s/Service.yml
          images: |
            viniciusdelr/agrosolutions-farmservice:v1

