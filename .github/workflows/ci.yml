name: CI - AgroSolutions Quality Check

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AgroSolutions-FarmService
        
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore AgroSolutions-FarmService.sln

      - name: Build do Projeto
        run: dotnet build AgroSolutions-FarmService.sln --no-restore -c Release

      - name: Validar Dockerfile
        run: docker build -t ci-test-image .
